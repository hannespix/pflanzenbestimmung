name: pages

# Veröffentlicht den aktuellen Stand des Werkzeugs nach jedem Merge (Push auf
# main) automatisch auf GitHub Pages. Voraussetzung: in den Repo-Einstellungen
# unter „Pages“ als Quelle „GitHub Actions“ wählen (der Workflow versucht das per
# enablement:true selbst zu aktivieren, sofern das Token die Rechte hat).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Gleichzeitige Deploys vermeiden; laufende abbrechen, wenn ein neuer Merge kommt.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build (Single-File HTML)
        run: python3 build.py
      - name: Offline-Check Startseite (kein CDN, keine externen Ressourcen)
        run: python3 tools/check_offline.py dist/index.html
      - name: Offline-Check Prüfungswerkzeug (kein CDN, keine externen Ressourcen)
        run: python3 tools/check_offline.py dist/pflanzenkenntnis.html
      - name: Offline-Check Lern-Tool (kein CDN, keine externen Ressourcen)
        run: python3 tools/check_offline.py dist/pflanzen-lernen.html
      - name: Offline-Check Impressum/Datenschutz (kein CDN, keine externen Ressourcen)
        run: python3 tools/check_offline.py dist/rechtliches.html
      - name: Seite vorbereiten (Startseite + beide Werkzeuge + Rechtliches + PWA)
        run: |
          mkdir -p _site
          cp dist/index.html _site/index.html
          cp dist/pflanzenkenntnis.html _site/pflanzenkenntnis.html
          cp dist/pflanzen-lernen.html _site/pflanzen-lernen.html
          cp dist/rechtliches.html _site/rechtliches.html
          # PWA: Manifest, Service Worker und Icons (Installation + Offline-Cache)
          cp dist/manifest.webmanifest _site/manifest.webmanifest
          cp dist/sw.js _site/sw.js
          cp dist/icon-192.png dist/icon-512.png dist/icon-maskable.png dist/apple-touch-icon.png _site/
      - name: Pages konfigurieren
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Auf GitHub Pages veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
